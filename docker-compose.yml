services:
  postgres:
    image: postgres:16-alpine
    container_name: anyalert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: anyalert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d anyalert" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anyalert-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anyalert-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/anyalert
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  parser-worker:
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: anyalert-parser-worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_API_URL: http://backend:8000/api/v1
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  parser-beat:
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: anyalert-parser-beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_API_URL: http://backend:8000/api/v1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
